<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self';"
    />
    <title>Burnbar — Usage Dashboard</title>
    <link rel="stylesheet" href="dashboard.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">Burnbar</div>
      <div class="total">
        <span class="total-label" id="total-label">All-time</span>
        <span class="total-value" id="total-value">—</span>
      </div>
    </header>

    <section class="controls">
      <div class="segmented" id="range" role="group" aria-label="Time range">
        <button type="button" data-range="30d" class="active" aria-pressed="true">30d</button>
        <button type="button" data-range="90d">90d</button>
        <button type="button" data-range="all">All</button>
      </div>
      <div class="segmented" id="view" role="group" aria-label="View">
        <button type="button" data-view="chart" class="active" aria-pressed="true">Chart</button>
        <button type="button" data-view="heatmap">Heatmap</button>
      </div>
      <div class="segmented" id="dimension" role="group" aria-label="Breakdown">
        <button type="button" data-dim="none" class="active" aria-pressed="true">Total</button>
        <button type="button" data-dim="model">By model</button>
        <button type="button" data-dim="agent">By agent</button>
      </div>
      <div class="export-buttons" role="group" aria-label="Export data">
        <button type="button" id="export-json" class="export-btn">↓ JSON</button>
        <button type="button" id="export-csv" class="export-btn">↓ CSV</button>
      </div>
    </section>

    <main class="chart-area">
      <canvas id="chart" aria-label="Usage cost chart" role="img"></canvas>
      <div class="heatmap" id="heatmap" role="grid" aria-label="Daily cost heatmap" hidden>
        <div class="heatmap-scroll">
          <div class="heatmap-months" id="heatmap-months" aria-hidden="true"></div>
          <div class="heatmap-body">
            <div class="heatmap-weekdays" aria-hidden="true">
              <span></span><span>Mon</span><span></span><span>Wed</span><span></span><span>Fri</span
              ><span></span>
            </div>
            <div class="heatmap-grid" id="heatmap-grid"></div>
          </div>
        </div>
        <div class="heatmap-legend" aria-hidden="true">
          <span class="heatmap-legend-label">Less</span>
          <span class="heatmap-swatch" data-level="0"></span>
          <span class="heatmap-swatch" data-level="1"></span>
          <span class="heatmap-swatch" data-level="2"></span>
          <span class="heatmap-swatch" data-level="3"></span>
          <span class="heatmap-swatch" data-level="4"></span>
          <span class="heatmap-legend-label">More</span>
        </div>
      </div>
      <p class="empty" id="empty" hidden>No archived usage yet — it fills as Burnbar runs.</p>
      <p class="error" id="error" hidden></p>
    </main>

    <div class="heatmap-tooltip" id="heatmap-tooltip" role="tooltip" hidden></div>

    <script type="module" src="renderer.js"></script>
  </body>
</html>
