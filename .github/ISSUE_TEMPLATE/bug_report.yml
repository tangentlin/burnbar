name: Bug report
description: Something in Burnbar isn't working the way it should.
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Click the tray icon
        2. Open the dashboard
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: burnbar-version
    attributes:
      label: Burnbar version
      description: Tray menu → About Burnbar.
      placeholder: v0.4.0
    validations:
      required: true

  - type: input
    id: macos-version
    attributes:
      label: macOS version
      placeholder: macOS 15.1 (Sequoia), Apple Silicon
    validations:
      required: true

  - type: input
    id: agent-cli
    attributes:
      label: Agent CLI(s) in use
      description: Claude Code, Codex, etc. — whichever ccusage is reading logs for.
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Anything from the tray/dashboard, or Console.app output for Burnbar. Redact any cost/token numbers you'd rather not share.
    validations:
      required: false
