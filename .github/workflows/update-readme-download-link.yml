name: Update README Download Link

# Stable releases publish as a draft (see release.yml) and only become
# publicly downloadable once a maintainer manually clicks "Publish release" —
# so this reacts to that publish event rather than the tag push, otherwise
# README.md would briefly link to an asset nobody outside the repo can fetch
# yet. Pre-release tags publish immediately but are filtered out below: the
# README should always point at the latest *stable* build.
on:
  release:
    types: [published]

concurrency:
  group: readme-download-link
  cancel-in-progress: false

jobs:
  update-link:
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the README update straight to main

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22.x"

      - name: Find the dmg asset
        # Build the browser_download_url ourselves from the asset name rather
        # than trust a specific `gh --json` field name for it — release.yml's
        # own "Verify assets landed" step already relies on `.assets[].name`
        # being stable, so reuse just that and the documented
        # /releases/download/<tag>/<name> URL shape electron-builder publishes to.
        #
        # This normally fires well after release.yml's upload finished (a
        # maintainer manually publishes the draft). But nothing stops that
        # click from landing while electron-builder is still mid-upload — the
        # draft is visible (and publishable) from the moment it's created,
        # before any asset is attached. Poll instead of failing on the first
        # empty check, so an early publish waits for the assets rather than
        # erroring out.
        id: asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          name=""
          for attempt in $(seq 1 10); do
            name="$(gh release view "$TAG" --repo "${{ github.repository }}" --json assets \
              --jq '.assets[] | select(.name | endswith(".dmg")) | .name')"
            if [[ -n "$name" ]]; then
              break
            fi
            echo "No .dmg asset yet on $TAG (attempt $attempt/10) — release.yml may still be uploading, waiting…"
            sleep $((attempt * 15))
          done
          if [[ -z "$name" ]]; then
            echo "::error::No .dmg asset found on release $TAG after waiting"
            exit 1
          fi
          echo "url=https://github.com/${{ github.repository }}/releases/download/$TAG/$name" >> "$GITHUB_OUTPUT"

      - name: Update README.md
        env:
          TAG: ${{ github.event.release.tag_name }}
          DMG_URL: ${{ steps.asset.outputs.url }}
        run: node scripts/update-readme-download-link.mjs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "README.md already points at this release; nothing to do."
            exit 0
          fi
          git commit -m "docs: point README download link at ${{ github.event.release.tag_name }}"
          git push origin HEAD:main
